name: CD - Deploy to EC2
on:
  workflow_run:
    workflows: ["CI - Build & Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/myapp
            TAG=${{ github.event.workflow_run.head_sha }}

            echo "=== STEP 1: Updating System Packages ==="
            sudo apt-get update -y

            echo "=== STEP 2: Installing Docker Non-Interactively ==="
            sudo NEEDRESTART_MODE=a apt-get install -y docker.io

            echo "=== STEP 3: Starting Docker Service ==="
            sudo systemctl start docker
            sudo systemctl enable docker

            echo "=== STEP 4: Cleaning Up Old Container ==="
            sudo docker stop myapp || true
            sudo docker rm -f myapp || true

            echo "=== STEP 5: Pulling New Image from Docker Hub ==="
            sudo docker pull $IMAGE:$TAG

            echo "=== STEP 6: Running Automated Container ==="
            sudo docker run -d --restart always --name myapp -p 8080:80 $IMAGE:$TAG

            echo "=== SUCCESS: Fully Automated Deployment Completed! ==="
